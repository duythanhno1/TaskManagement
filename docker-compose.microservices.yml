version: '3.8'

services:
  # --- API Gateway ---
  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: tm-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - task-service
      - chat-service
      - notification-service
    restart: unless-stopped

  # --- Auth Service ---
  auth-service:
    build:
      context: .
      dockerfile: src/Services/Auth/Auth.API/Dockerfile
    container_name: tm-auth
    ports:
      - "5001:5001"
      - "5011:5011"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=AuthDB;User Id=sa;Password=YourStrong@Pass123;Trust Server Certificate=True
      - JWT__SecretKey=SuperkeyPRoWith256BitsAnd32BytesStringVip456
      - RabbitMQ__Host=rabbitmq
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- Task Service ---
  task-service:
    build:
      context: .
      dockerfile: src/Services/Task/Task.API/Dockerfile
    container_name: tm-task
    ports:
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=TaskDB;User Id=sa;Password=YourStrong@Pass123;Trust Server Certificate=True
      - JWT__SecretKey=SuperkeyPRoWith256BitsAnd32BytesStringVip456
      - RabbitMQ__Host=rabbitmq
      - AuthService__GrpcUrl=http://auth-service:5011
      - Redis__ConnectionString=redis:6379
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- Chat Service ---
  chat-service:
    build:
      context: .
      dockerfile: src/Services/Chat/Chat.API/Dockerfile
    container_name: tm-chat
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ChatDB;User Id=sa;Password=YourStrong@Pass123;Trust Server Certificate=True
      - JWT__SecretKey=SuperkeyPRoWith256BitsAnd32BytesStringVip456
      - RabbitMQ__Host=rabbitmq
      - AuthService__GrpcUrl=http://auth-service:5011
      - Redis__ConnectionString=redis:6379
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- Notification Service ---
  notification-service:
    build:
      context: .
      dockerfile: src/Services/Notification/Notification.API/Dockerfile
    container_name: tm-notification
    ports:
      - "5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=NotificationDB;User Id=sa;Password=YourStrong@Pass123;Trust Server Certificate=True
      - JWT__SecretKey=SuperkeyPRoWith256BitsAnd32BytesStringVip456
      - RabbitMQ__Host=rabbitmq
      - Redis__ConnectionString=redis:6379
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- Infrastructure ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tm-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Pass123
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Pass123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tm-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: tm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.microservices.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - auth-service
      - task-service
      - chat-service
      - notification-service
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: tm-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  sqlserver_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
