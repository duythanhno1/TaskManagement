global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:5001']
  - job_name: 'task-service'
    static_configs:
      - targets: ['task-service:5002']
  - job_name: 'chat-service'
    static_configs:
      - targets: ['chat-service:5003']
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:5004']
